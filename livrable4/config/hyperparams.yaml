# Hyperparamètres MAPPO-NS
# Projet YUCCA-ADV - Livrable 4

# Paramètres d'apprentissage
learning_rate_actor: 0.0003
learning_rate_critic: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.01
value_loss_coef: 0.5
max_grad_norm: 0.5

# Architecture des réseaux
batch_size: 32
epochs: 3
hidden_layers: [128, 64]
activation: "ReLU"
optimizer: "Adam"

# Environnement
num_agents: 3
episode_length: 500
observation_dim: 6
action_dim: 5

# Shield neurosymbolique
use_shield: true
shield_rules: ["R1", "R2", "R3", "R4", "R5", "R6", "R7"]
rule_priorities:
  R1: 1
  R2: 2
  R3: 1
  R4: 2
  R5: 1
  R6: 3
  R7: 1

# Domain Randomization
domain_randomization:
  temperature_gain: [0.8, 1.2]
  pressure_gain: [0.85, 1.15]
  speed_gain: [0.9, 1.1]
  sensor_noise: [0.0, 0.05]
  latency_ms: [0, 100]

# Adaptation en ligne
online_adapter:
  adaptation_rate: 0.01
  forget_factor: 0.95
  window_size: 100
  min_confidence: 0.5

# Hardware
hardware:
  serial_port: "/dev/ttyUSB0"
  baud_rate: 115200
  gpio_pins:
    temp_sensor: 4
    pressure_sensor: 17
    motor_pwm: 18
    led_status: 27
    led_error: 22